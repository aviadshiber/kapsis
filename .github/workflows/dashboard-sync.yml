name: dashboard-sync

on:
  pull_request:
    paths:
      - "scripts/lib/status.sh"
      - "scripts/lib/audit.sh"
      - "dashboard/server/src/types.ts"
      - ".github/workflows/dashboard-sync.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - name: Check dashboard sync
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          touches_lib=$(printf '%s\n' "$changed" | grep -E '^scripts/lib/(status|audit)\.sh$' || true)
          touches_types=$(printf '%s\n' "$changed" | grep -E '^dashboard/server/src/types\.ts$' || true)
          if [[ -n "$touches_lib" && -z "$touches_types" ]]; then
            echo "::error::Dashboard sync required: $touches_lib changed but dashboard/server/src/types.ts was not updated."
            echo "See CLAUDE.md → Dashboard Sync Rule."
            exit 1
          fi
          echo "Dashboard sync OK."
