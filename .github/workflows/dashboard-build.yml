name: dashboard-build

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-build.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-build.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Typecheck server
        working-directory: dashboard/server
        run: bunx tsc --noEmit
      - name: Typecheck UI
        working-directory: dashboard/ui
        run: bunx tsc --noEmit
      - name: Test
        working-directory: dashboard/server
        run: bun test

  compile:
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            runner: macos-latest
            runnerArch: ARM64
          - target: bun-darwin-x64
            runner: macos-13
            runnerArch: X64
          - target: bun-linux-arm64
            runner: ubuntu-latest
            runnerArch: X64
          - target: bun-linux-x64
            runner: ubuntu-latest
            runnerArch: X64
    defaults:
      run:
        working-directory: dashboard
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Build UI
        run: bun run build:ui
      - name: Compile binary
        run: |
          mkdir -p bin
          bun build --compile --minify --target="$TARGET" \
            server/src/main.ts \
            --outfile "bin/kapsis-dashboard-$TARGET"
      # Only smoke-test the binary when the host architecture matches the
      # target's architecture (cross-compiled binaries cannot execute on the
      # build host — e.g. linux-arm64 on an x64 ubuntu runner).
      - name: Verify binary runs
        if: ${{ (contains(matrix.target, 'x64') && matrix.runnerArch == 'X64') || (contains(matrix.target, 'arm64') && matrix.runnerArch == 'ARM64') }}
        run: ./bin/kapsis-dashboard-"$TARGET" --version
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: kapsis-dashboard-${{ matrix.target }}
          path: dashboard/bin/kapsis-dashboard-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7
