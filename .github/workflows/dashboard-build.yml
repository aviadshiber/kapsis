name: dashboard-build

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-build.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-build.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Typecheck server
        working-directory: dashboard/server
        run: bunx tsc --noEmit
      - name: Typecheck UI
        working-directory: dashboard/ui
        run: bunx tsc --noEmit
      - name: Test
        working-directory: dashboard/server
        run: bun test

  compile:
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            runner: macos-latest
          - target: bun-darwin-x64
            runner: macos-13
          - target: bun-linux-arm64
            runner: ubuntu-latest
          - target: bun-linux-x64
            runner: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Build UI
        run: bun run build:ui
      - name: Compile binary
        run: |
          mkdir -p bin
          bun build --compile --minify --target="$TARGET" \
            server/src/main.ts \
            --outfile "bin/kapsis-dashboard-$TARGET"
      - name: Verify binary runs
        if: ${{ !contains(matrix.target, 'x64') || runner.arch == 'X64' }}
        run: ./bin/kapsis-dashboard-"$TARGET" --version
      - uses: actions/upload-artifact@v4
        with:
          name: kapsis-dashboard-${{ matrix.target }}
          path: dashboard/bin/kapsis-dashboard-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7
