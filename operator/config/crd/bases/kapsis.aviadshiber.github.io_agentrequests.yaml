---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agentrequests.kapsis.aviadshiber.github.io
spec:
  group: kapsis.aviadshiber.github.io
  names:
    kind: AgentRequest
    listKind: AgentRequestList
    plural: agentrequests
    shortNames:
    - ar
    - agent
    singular: agentrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agent.type
      name: Agent
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.progress
      name: Progress
      type: integer
    - jsonPath: .status.jobName
      name: Job
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentRequest is the Schema for the agentrequests API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentRequestSpec defines the desired state of AgentRequest.
            properties:
              agent:
                description: Agent defines the agent type and container image.
                properties:
                  command:
                    description: Command overrides the container entrypoint.
                    items:
                      type: string
                    type: array
                  image:
                    description: Image is the container image to run.
                    type: string
                  type:
                    description: Type is the agent identifier (claude-cli, codex-cli,
                      aider, gemini-cli).
                    enum:
                    - claude-cli
                    - codex-cli
                    - aider
                    - gemini-cli
                    type: string
                  workdir:
                    default: /workspace
                    description: Workdir is the working directory inside the container.
                    type: string
                required:
                - image
                - type
                type: object
              buildCache:
                description: BuildCache mounts a PVC-backed build tool cache (Maven,
                  Gradle, npm).
                properties:
                  claimRef:
                    description: ClaimRef is the name of an existing PersistentVolumeClaim
                      to mount.
                    type: string
                  mountPath:
                    default: /root/.m2
                    description: MountPath is the path inside the agent container
                      where the PVC is mounted.
                    type: string
                required:
                - claimRef
                type: object
              environment:
                description: Environment defines user-supplied environment variables,
                  secrets, and ConfigMap mounts.
                properties:
                  configMounts:
                    description: ConfigMounts are ConfigMaps to mount as read-only
                      volumes inside the agent container.
                    items:
                      description: ConfigMount defines a ConfigMap to mount as a read-only
                        volume.
                      properties:
                        mountPath:
                          description: |-
                            MountPath inside the agent container.
                            Must not overlap with /etc/, /proc/, /sys/, or .git/hooks/.
                          type: string
                        name:
                          description: Name of the ConfigMap.
                          type: string
                      required:
                      - mountPath
                      - name
                      type: object
                    type: array
                  secretRefs:
                    description: SecretRefs are Secrets to expose as environment variables
                      via envFrom.
                    items:
                      description: SecretRef references a Kubernetes Secret by name.
                      properties:
                        name:
                          description: Name of the Secret.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  vars:
                    description: |-
                      Vars is a list of plain environment variables.
                      Names must not start with "KAPSIS_" (reserved for operator-injected variables).
                    items:
                      description: EnvVar is a name-value environment variable pair.
                      properties:
                        name:
                          description: Name of the environment variable. Must not
                            start with "KAPSIS_".
                          type: string
                        value:
                          description: Value of the environment variable.
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                type: object
              liveness:
                description: Liveness configures agent activity monitoring and hung-process
                  detection.
                properties:
                  completionTimeoutSeconds:
                    default: 120
                    description: |-
                      CompletionTimeoutSeconds is how long to wait after the agent reports completion
                      before forcibly killing the process (handles stuck MCP servers, etc.).
                    format: int32
                    minimum: 30
                    type: integer
                  enabled:
                    default: true
                    description: Enabled controls whether liveness monitoring is active.
                    type: boolean
                  gracePeriodSeconds:
                    default: 300
                    description: GracePeriodSeconds is how long to skip liveness checks
                      after agent start.
                    format: int32
                    type: integer
                  timeoutSeconds:
                    default: 900
                    description: TimeoutSeconds is how long to wait without activity
                      before killing the agent.
                    format: int32
                    minimum: 60
                    type: integer
                type: object
              network:
                description: Network defines network isolation mode.
                properties:
                  mode:
                    default: filtered
                    description: |-
                      Mode is the network isolation mode.
                      none: deny all egress. filtered: allow git/npm/Maven/PyPI ports + DNS. open: unrestricted.
                    enum:
                    - none
                    - filtered
                    - open
                    type: string
                type: object
              podAnnotations:
                additionalProperties:
                  type: string
                description: |-
                  PodAnnotations are passed through to the Job pod template.
                  Use this for annotation-based sidecar injection (Vault, Istio, Prometheus, etc.).
                type: object
              resources:
                description: Resources defines CPU/memory limits and workspace disk
                  quota.
                properties:
                  cpu:
                    default: "4"
                    description: CPU limit (e.g., "4").
                    type: string
                  memory:
                    default: 8Gi
                    description: Memory limit (e.g., "8Gi").
                    type: string
                  workspaceSizeLimit:
                    default: 20Gi
                    description: |-
                      WorkspaceSizeLimit caps the emptyDir workspace volume (e.g., "20Gi").
                      Prevents noisy-neighbour disk exhaustion on the node.
                    type: string
                type: object
              security:
                description: Security defines the security profile and container hardening
                  settings.
                properties:
                  nestedContainers:
                    default: false
                    description: |-
                      NestedContainers allows Podman-in-pod (rootless containers inside the agent).
                      Requires the namespace to have PSA policy "privileged" and explicit admission approval.
                    type: boolean
                  profile:
                    default: standard
                    description: Profile is the security hardening level.
                    enum:
                    - minimal
                    - standard
                    - strict
                    - paranoid
                    type: string
                  runAsGroup:
                    default: 1000
                    description: RunAsGroup sets the GID for the agent container.
                    format: int64
                    type: integer
                  runAsUser:
                    default: 1000
                    description: RunAsUser sets the UID for the agent container.
                    format: int64
                    type: integer
                  runtimeClass:
                    description: |-
                      RuntimeClass selects an alternative container runtime (e.g. gvisor, kata-containers).
                      Typically used with the paranoid profile.
                    type: string
                  serviceAccountName:
                    default: kapsis-agent
                    description: ServiceAccountName is the Kubernetes ServiceAccount
                      to bind to the Job pod.
                    type: string
                type: object
              task:
                description: Task defines what the agent should do.
                properties:
                  inline:
                    description: Inline is a free-form task description passed as
                      the KAPSIS_TASK environment variable.
                    type: string
                  specConfigMapRef:
                    description: |-
                      SpecConfigMapRef references a ConfigMap containing a task spec file (e.g., spec.md).
                      The file is mounted read-only at /task-spec.md inside the agent container.
                    properties:
                      key:
                        default: spec.md
                        description: Key within the ConfigMap. Defaults to "spec.md"
                          if omitted.
                        type: string
                      name:
                        description: Name of the ConfigMap.
                        type: string
                    required:
                    - name
                    type: object
                type: object
              ttl:
                default: 3600
                description: |-
                  TTL is the maximum lifetime of the agent Job in seconds.
                  The Job is killed when this deadline is exceeded.
                format: int64
                maximum: 86400
                minimum: 1
                type: integer
              workspace:
                description: Workspace defines the git repository to clone.
                properties:
                  git:
                    description: Git defines the git repository configuration.
                    properties:
                      baseBranch:
                        default: main
                        description: BaseBranch is the source branch for new branches
                          and the merge base.
                        type: string
                      branch:
                        description: Branch to work on. Created from BaseBranch if
                          it does not exist.
                        type: string
                      credentialSecretRef:
                        description: |-
                          CredentialSecretRef is the name of a Secret that contains a GIT_TOKEN key
                          used for authenticated git operations.
                        type: string
                      push:
                        default: false
                        description: Push indicates whether to commit and push changes
                          after the agent completes.
                        type: boolean
                      url:
                        description: URL is the repository URL to clone.
                        type: string
                    required:
                    - url
                    type: object
                type: object
            required:
            - agent
            type: object
          status:
            description: AgentRequestStatus defines the observed state of AgentRequest.
            properties:
              commitSha:
                description: CommitSha is the SHA of the commit created by the agent.
                type: string
              completedAt:
                description: CompletedAt is when the agent container finished.
                format: date-time
                type: string
              conditions:
                description: |-
                  Conditions represent the latest available observations of the AgentRequest state.
                  Defined for future use; not populated in v1alpha1.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              error:
                description: Error is a human-readable failure description (populated
                  when phase=Failed).
                type: string
              exitCode:
                description: ExitCode is the container exit code (populated when the
                  agent completes).
                format: int32
                type: integer
              gist:
                description: Gist is a short natural-language summary of the agent's
                  current work.
                maxLength: 1024
                type: string
              jobName:
                description: JobName is the name of the batch/v1 Job created for this
                  request.
                type: string
              message:
                description: Message is a human-readable status message from the agent
                  or operator.
                maxLength: 1024
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                type: string
              podName:
                description: PodName is the name of the Job's pod (populated once
                  the pod is scheduled).
                type: string
              prUrl:
                description: PrUrl is the URL of the pull/merge request created by
                  the agent.
                type: string
              progress:
                description: Progress percentage (0–100) reported by the agent.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              pushFallbackCommand:
                description: |-
                  PushFallbackCommand is a ready-to-run git push command for manual recovery
                  when the in-container push failed (typically due to missing credentials).
                type: string
              pushStatus:
                description: 'PushStatus indicates the result of the post-agent git
                  push: success, failed, or skipped.'
                type: string
              startedAt:
                description: StartedAt is when the agent container started.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
