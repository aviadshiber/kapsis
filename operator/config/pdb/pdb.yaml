---
# PodDisruptionBudget ensures at least one operator replica is available
# during voluntary disruptions (node drains, rolling updates, etc.).
# Combined with replicas: 2 in manager.yaml, this provides operator HA.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: controller-manager-pdb
  namespace: NAMESPACE
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kapsis-operator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kapsis-operator
