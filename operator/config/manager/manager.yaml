# This file uses NAMESPACE as a placeholder.
# Either run `scripts/k8s-deploy.sh` (which substitutes it) or replace NAMESPACE manually.
#
# The operator and agent Jobs run in the same namespace.
# The namespace should have PSA policy "baseline" for normal workloads.
# For nestedContainers=true (Podman-in-pod), change to "privileged" and
# configure the NestedContainerNamespaces allowlist in the validator.
apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kapsis-operator
    app.kubernetes.io/managed-by: kustomize
    pod-security.kubernetes.io/enforce: baseline
  name: NAMESPACE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: NAMESPACE
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kapsis-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kapsis-operator
  # Two replicas with leader election for HA — survives pod restarts and node failures.
  replicas: 2
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kapsis-operator
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
        - name: WATCH_NAMESPACE
          value: NAMESPACE
        # Optional: override the status sidecar image.
        # - name: KAPSIS_STATUS_SIDECAR_IMAGE
        #   value: ghcr.io/aviadshiber/kapsis/status-sidecar:latest
        #
        # Security validation (enforced by the reconciler always, and by the
        # admission webhook when deployed). Defaults: images restricted to
        # ghcr.io/aviadshiber/kapsis/, serviceAccountName must be kapsis-agent,
        # and nestedContainers=true is forbidden in every namespace. Override:
        # - name: KAPSIS_IMAGE_ALLOWLIST            # comma/space-separated image prefixes
        #   value: ghcr.io/aviadshiber/kapsis/,ghcr.io/my-org/kapsis/
        # - name: KAPSIS_APPROVED_SERVICE_ACCOUNTS  # comma/space-separated SA names
        #   value: kapsis-agent
        # - name: KAPSIS_NESTED_CONTAINER_NAMESPACES # namespaces allowed to use nestedContainers
        #   value: kapsis-privileged
        #
        # Opt-in admission webhook (defense in depth; the reconciler always
        # enforces the invariants above). Requires serving certs mounted into the
        # pod and a ValidatingWebhookConfiguration (config/webhook + cert-manager)
        # — without them the manager fails to start.
        # - name: ENABLE_WEBHOOKS
        #   value: "true"
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
