---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kapsis-aviadshiber-github-io-v1alpha1-agentrequest
  failurePolicy: Fail
  name: vagentrequest.kb.io
  rules:
  - apiGroups:
    - kapsis.aviadshiber.github.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agentrequests
  sideEffects: None
