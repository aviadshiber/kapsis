---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - kapsis.kapsis.io
  resources:
  - agentrequests
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kapsis.kapsis.io
  resources:
  - agentrequests/finalizers
  verbs:
  - update
- apiGroups:
  - kapsis.kapsis.io
  resources:
  - agentrequests/status
  verbs:
  - get
  - patch
  - update
