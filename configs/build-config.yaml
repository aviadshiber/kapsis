#===============================================================================
# Kapsis Build Configuration
#
# Controls which dependencies are installed in the container image.
# Default: All common features enabled for backwards compatibility.
#
# Usage:
#   ./scripts/build-image.sh                          # Uses this config
#   ./scripts/build-image.sh --build-config custom.yaml
#   ./scripts/build-image.sh --profile minimal        # Use preset profile
#   ./scripts/configure-deps.sh                       # Interactive editor
#   ./scripts/configure-deps.sh --profile java-dev    # Apply preset
#
# Profiles available in configs/build-profiles/:
#   minimal      - Base only (~500MB)
#   java-dev     - Java + Maven + GE (~1.5GB)
#   java8-legacy - Java 8 only (~1.3GB)
#   full-stack   - Java + Node + Python (~2.1GB) [default]
#   backend-go   - Go + Python (~1.2GB)
#   backend-rust - Rust + Python (~1.4GB)
#   ml-python    - Python + Node + Rust (~1.8GB)
#   frontend     - Node + Rust (~1.2GB)
#===============================================================================

# Schema version for forward compatibility
version: "1.0"

#===============================================================================
# LANGUAGE RUNTIMES
#===============================================================================
languages:
  #-----------------------------------------------------------------------------
  # Java (via SDKMAN)
  # Supports multiple versions and distributions
  #-----------------------------------------------------------------------------
  java:
    enabled: true
    # Versions to install (SDKMAN format: VERSION-DISTRIBUTION)
    # Use `sdk list java` to see all available versions
    versions:
      - "21.0.6-zulu"    # Azul Zulu 21 LTS (recommended)
      - "17.0.14-zulu"   # Azul Zulu 17 LTS
      - "8.0.422-zulu"   # Azul Zulu 8 LTS
    # Default version (must be in versions list)
    default_version: "17.0.14-zulu"
    # Supported distributions (SDKMAN suffix):
    #   -zulu    Azul Zulu - TCK-tested, broad platform support
    #   -tem     Eclipse Temurin - SDKMAN default, vendor-neutral
    #   -amzn    Amazon Corretto - AWS-optimized, long-term support
    #   -librca  BellSoft Liberica - Spring Boot official
    #   -graalce GraalVM CE - native image, polyglot
    #   -ms      Microsoft OpenJDK - Azure-optimized
    #   -sem     IBM Semeru - OpenJ9 VM, low memory
    #   -sapmchn SAP Machine
    #   -open    Oracle OpenJDK (not recommended - short support)

  #-----------------------------------------------------------------------------
  # Node.js (via NVM)
  #-----------------------------------------------------------------------------
  nodejs:
    enabled: true
    # Versions to install (first is primary)
    versions:
      - "24.14.1"        # LTS
    default_version: "24.14.1"
    # Package managers to install globally
    package_managers:
      pnpm: "9.15.3"
      # yarn: "latest"   # Uncomment to install yarn

  #-----------------------------------------------------------------------------
  # Python
  # Uses system Python from Ubuntu (3.12 on 24.04)
  #-----------------------------------------------------------------------------
  python:
    enabled: true
    version: "system"    # Uses Ubuntu's Python 3.12
    venv: true           # Install python3-venv
    pip: true            # Install pip
    # Additional packages to install globally via pip
    packages: []
    # Example:
    # packages:
    #   - "poetry"
    #   - "pipenv"

  #-----------------------------------------------------------------------------
  # Rust (via rustup)
  #-----------------------------------------------------------------------------
  rust:
    enabled: false
    channel: "stable"    # stable, beta, nightly
    components:
      - "rustfmt"
      - "clippy"
    # Enable cargo-binstall for faster binary installs
    cargo_binstall: true

  #-----------------------------------------------------------------------------
  # Go
  #-----------------------------------------------------------------------------
  go:
    enabled: false
    version: "1.26.1"
    # Enable module support (default behavior in modern Go)
    modules: true

  #-----------------------------------------------------------------------------
  # Ruby (from apt)
  #-----------------------------------------------------------------------------
  ruby:
    enabled: false
    version: "system"    # Uses Ubuntu's Ruby
    bundler: true        # Install bundler gem

  #-----------------------------------------------------------------------------
  # .NET (from Microsoft repos)
  #-----------------------------------------------------------------------------
  dotnet:
    enabled: false
    version: "8.0"       # .NET 8 LTS
    sdk: true            # Install SDK (not just runtime)

#===============================================================================
# BUILD TOOLS
#===============================================================================
build_tools:
  #-----------------------------------------------------------------------------
  # Maven (via SDKMAN, requires Java)
  #-----------------------------------------------------------------------------
  maven:
    enabled: true
    version: "3.9.9"

  #-----------------------------------------------------------------------------
  # Gradle (via SDKMAN, requires Java)
  # Note: Most projects use gradlew, so this is optional
  #-----------------------------------------------------------------------------
  gradle:
    enabled: false
    version: "8.5"

  #-----------------------------------------------------------------------------
  # Maven extensions
  # Pre-cached into the offline m2 repo for network-isolated builds — Maven
  # extensions resolve BEFORE settings.xml is processed, so they can't use an
  # authenticated/allowlisted mirror on first use. Any Maven extension
  # coordinate can go in `extensions` (not just Gradle Enterprise/Develocity,
  # the default below). Kapsis only caches these jars — it does not write a
  # project's own .mvn/extensions.xml; that still comes from the user's repo.
  #
  # `vulnerable_paths` is optional: known-vulnerable transitive jars/poms the
  # configured extensions pull in at old versions, removed from the cache
  # after resolution (dependencyManagement does not prevent this in
  # practice). Specific to the `extensions` list above — if you change that
  # list, re-derive vulnerable_paths from a fresh vulnerability scan rather
  # than reusing these paths, and clear it if you don't have a scan to base
  # it on. See docs/BUILD-CONFIGURATION.md for details.
  #-----------------------------------------------------------------------------
  maven_extensions:
    enabled: true
    extensions:
      - group_id: "com.gradle"
        artifact_id: "gradle-enterprise-maven-extension"
        version: "1.20"
      - group_id: "com.gradle"
        artifact_id: "common-custom-user-data-maven-extension"
        version: "1.12.5"
    vulnerable_paths:
      - "dom4j/dom4j/1.1"
      - "org/apache/maven/maven-core/3.2.5"
      - "org/apache/commons/commons-compress/1.20"
      - "commons-io/commons-io/2.6"
      - "commons-io/commons-io/2.11.0"
      - "org/eclipse/jetty/jetty-http/9.4.46.v20220331"
      - "org/eclipse/jetty/jetty-server/9.4.46.v20220331"
      - "org/jsoup/jsoup/1.10.2"
      - "org/codehaus/plexus/plexus-archiver/4.2.7"
      - "org/codehaus/plexus/plexus-utils/3.4.2"
      - "org/codehaus/plexus/plexus-utils/3.5.1"
      - "org/codehaus/plexus/plexus-utils/4.0.0"
      - "org/codehaus/plexus/plexus-utils/4.0.1"

  #-----------------------------------------------------------------------------
  # Protocol Buffers (protoc)
  # Pre-cached for offline builds
  #-----------------------------------------------------------------------------
  protoc:
    enabled: true
    # 34.1 never existed on Maven Central (real history is 2.x/3.x then a 4.x
    # realignment). 3.25.1 matches every configs/build-profiles/*.yaml pin.
    version: "3.25.1"
    # Pre-cache binaries for both architectures
    cache_binaries: true
    architectures:
      - "linux-x86_64"
      - "linux-aarch_64"

#===============================================================================
# SYSTEM PACKAGES (apt)
#===============================================================================
system_packages:
  #-----------------------------------------------------------------------------
  # Essential packages (always installed, cannot be disabled)
  #-----------------------------------------------------------------------------
  # curl, wget, git, jq, unzip, zip, ca-certificates, gnupg, openssh-client

  #-----------------------------------------------------------------------------
  # Development tools
  #-----------------------------------------------------------------------------
  development:
    enabled: true
    packages:
      - build-essential
      - ripgrep
      - fd-find

  #-----------------------------------------------------------------------------
  # Shell environments
  #-----------------------------------------------------------------------------
  shells:
    enabled: true
    packages:
      - bash
      - zsh

  #-----------------------------------------------------------------------------
  # System utilities
  #-----------------------------------------------------------------------------
  utilities:
    enabled: true
    packages:
      - procps
      - htop
      - less
      - vim-tiny
      - netcat-openbsd
      - dnsutils
      - dnsmasq

  #-----------------------------------------------------------------------------
  # Filesystem overlay (required for macOS CoW support)
  #-----------------------------------------------------------------------------
  overlay:
    enabled: true
    packages:
      - fuse-overlayfs
      - fuse3

  #-----------------------------------------------------------------------------
  # Custom packages (add your own)
  #-----------------------------------------------------------------------------
  custom: []
  # Example:
  # custom:
  #   - kafkacat
  #   - postgresql-client
  #   - redis-tools

#===============================================================================
# DEPENDENCY MANAGERS
#===============================================================================
dependency_managers:
  # yq (YAML processor) - required for Kapsis, always installed
  # v4.53.3: also picks up a newer Go toolchain (1.26.4), fixing the go-stdlib
  # CVEs grype flagged against the previously pinned v4.52.5 binary (built
  # with go1.26.1). See release scan findings, 2026-07-12.
  yq:
    version: "4.53.3"
    sha256: "fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4"
    # arm64 checksum: previously had no override mechanism at all (only amd64
    # was wired through), so arm64 builds silently skipped verification.
    sha256_arm64: "578648e463a11c1b6db6010cbf41eafed6bee79466fcffa1bb446672cf7945ea"

#===============================================================================
# IMAGE CONFIGURATION
#===============================================================================
image:
  # Base image (architecture-specific digest resolved at build time)
  base: "ubuntu:24.04"

  # Non-root user configuration
  user:
    name: "developer"
    uid: 1000
    gid: 1000

  # Image labels
  labels:
    maintainer: "Kapsis Project"
    description: "Hermetically isolated sandbox for AI coding agents"
