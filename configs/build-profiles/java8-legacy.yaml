#===============================================================================
# Kapsis Build Profile: Java 8 Legacy
#
# Java 8 only for legacy projects.
# Estimated size: ~1.3GB
#
# Use case: Legacy Java 8 applications, older Spring versions
#===============================================================================

version: "1.0"

languages:
  java:
    enabled: true
    versions:
      - "8.0.422-zulu"
    default_version: "8.0.422-zulu"

  nodejs:
    enabled: false

  python:
    enabled: true
    version: "system"
    venv: true
    pip: true

  rust:
    enabled: false

  go:
    enabled: false

build_tools:
  maven:
    enabled: true
    version: "3.9.9"

  gradle:
    enabled: false

  maven_extensions:
    enabled: true
    extensions:
      - group_id: "com.gradle"
        artifact_id: "gradle-enterprise-maven-extension"
        version: "1.20"
      - group_id: "com.gradle"
        artifact_id: "common-custom-user-data-maven-extension"
        version: "1.12.5"
    vulnerable_paths:
      - "dom4j/dom4j/1.1"
      - "org/apache/maven/maven-core/3.2.5"
      - "org/apache/commons/commons-compress/1.20"
      - "commons-io/commons-io/2.6"
      - "commons-io/commons-io/2.11.0"
      - "org/eclipse/jetty/jetty-http/9.4.46.v20220331"
      - "org/eclipse/jetty/jetty-server/9.4.46.v20220331"
      - "org/jsoup/jsoup/1.10.2"
      - "org/codehaus/plexus/plexus-archiver/4.2.7"
      - "org/codehaus/plexus/plexus-utils/3.4.2"
      - "org/codehaus/plexus/plexus-utils/3.5.1"
      - "org/codehaus/plexus/plexus-utils/4.0.0"
      - "org/codehaus/plexus/plexus-utils/4.0.1"

  protoc:
    enabled: true
    version: "3.25.1"

system_packages:
  development:
    enabled: true
  shells:
    enabled: true
  utilities:
    enabled: true
  overlay:
    enabled: true
  secret_store:
    enabled: true
  custom: []
