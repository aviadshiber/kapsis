#===============================================================================
# Kapsis Build Profile: Full Stack
#
# Java + Node.js + Python - complete development environment.
# This is the default profile for backwards compatibility.
# Estimated size: ~2.1GB
#
# Use case: Multi-language projects, full development environment
#===============================================================================

version: "1.0"

languages:
  java:
    enabled: true
    versions:
      - "21.0.6-zulu"
      - "17.0.14-zulu"
      - "8.0.422-zulu"
    default_version: "17.0.14-zulu"

  nodejs:
    enabled: true
    versions:
      - "24.14.1"
    default_version: "24.14.1"
    package_managers:
      pnpm: "9.15.3"

  python:
    enabled: true
    version: "system"
    venv: true
    pip: true

  rust:
    enabled: false

  go:
    enabled: false

build_tools:
  maven:
    enabled: true
    version: "3.9.9"

  gradle:
    enabled: false

  maven_extensions:
    enabled: true
    extensions:
      - group_id: "com.gradle"
        artifact_id: "gradle-enterprise-maven-extension"
        version: "1.20"
      - group_id: "com.gradle"
        artifact_id: "common-custom-user-data-maven-extension"
        version: "1.12.5"
    vulnerable_paths:
      - "dom4j/dom4j/1.1"
      - "org/apache/maven/maven-core/3.2.5"
      - "org/apache/commons/commons-compress/1.20"
      - "commons-io/commons-io/2.6"
      - "commons-io/commons-io/2.11.0"
      - "org/eclipse/jetty/jetty-http/9.4.46.v20220331"
      - "org/eclipse/jetty/jetty-server/9.4.46.v20220331"
      - "org/jsoup/jsoup/1.10.2"
      - "org/codehaus/plexus/plexus-archiver/4.2.7"
      - "org/codehaus/plexus/plexus-utils/3.4.2"
      - "org/codehaus/plexus/plexus-utils/3.5.1"
      - "org/codehaus/plexus/plexus-utils/4.0.0"
      - "org/codehaus/plexus/plexus-utils/4.0.1"

  protoc:
    enabled: true
    version: "3.25.1"

system_packages:
  development:
    enabled: true
  shells:
    enabled: true
  utilities:
    enabled: true
  overlay:
    enabled: true
  secret_store:
    enabled: true
  custom: []

# yq pin — kept in sync with configs/build-config.yaml. Without this section the
# profile fell back to build-config.sh's stale 4.44.3 default while the
# Containerfile's arm64 ARG default is for 4.53.3, so arm64 builds failed the
# checksum ("yq arm64 checksum mismatch"). 4.53.3 shas verified against the
# published GitHub release.
dependency_managers:
  yq:
    version: "4.53.3"
    sha256: "fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4"
    sha256_arm64: "578648e463a11c1b6db6010cbf41eafed6bee79466fcffa1bb446672cf7945ea"
