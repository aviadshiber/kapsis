# Kapsis Configuration - Codex CLI Agent
# Use with: ./scripts/launch-agent.sh ~/project --config configs/codex.yaml

agent:
  # Codex CLI with full auto approval
  # KAPSIS_INJECTED_TASK_SPEC is set by entrypoint.sh when status injection
  # appends progress/gist guidance to a writable copy of the task spec. Falls
  # back to the read-only /task-spec.md mount when no injection happened.
  command: "codex --approval-mode full-auto \"$(cat \"${KAPSIS_INJECTED_TASK_SPEC:-/task-spec.md}\")\""
  workdir: /workspace

filesystem:
  include:
    - ~/.codex
    - ~/.gitconfig
    - ~/.ssh
    - ~/.zshrc

environment:
  passthrough:
    - OPENAI_API_KEY
  set:
    MAVEN_OPTS: "-Xmx4g -XX:+UseG1GC"

resources:
  memory: 8g
  cpus: 4

#===============================================================================
# SECURITY - Container security hardening
#===============================================================================
security:
  profile: standard

  # Additional capabilities needed for specific features
  capabilities:
    add:
      # Required for network.mode: filtered (dnsmasq binds to port 53)
      - NET_BIND_SERVICE

maven:
  mirror_url: "https://artifactory.example.org/artifactory/releases"
  block_remote_snapshots: true
  block_deploy: true

git:
  auto_push:
    enabled: true
    remote: origin
    commit_message: |
      feat: {task}

      Generated by Codex CLI via Kapsis
      Branch: {branch}

  # Co-authors added to every commit (Git trailer format)
  co_authors:
    - "Aviad Shiber <aviadshiber@gmail.com>"

  # Files to exclude from commits (prevents accidental commits)
  commit_exclude:
    - ".gitignore"
    - "**/.gitignore"

  # Fork-first workflow for contributing to external repos
  fork_workflow:
    enabled: false
    fallback: fork
